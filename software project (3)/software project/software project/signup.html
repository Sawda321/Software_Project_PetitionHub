<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetitionHub - Sign Up</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/signup.css">

    <!-- Firebase SDK -->
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCI7tuF1SJdnbZRdFB6lMzltEl03EeBTwE",
            authDomain: "petitionhub-efba1.firebaseapp.com",
            projectId: "petitionhub-efba1",
            storageBucket: "petitionhub-efba1.firebasestorage.app",
            messagingSenderId: "761927201636",
            appId: "1:761927201636:web:afa75a303f4394b2a7c071"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // SIGNUP FUNCTION
        window.signup = function () {
            const fullname = document.getElementById("fullname").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!fullname || !email || !password) {
                alert("Please fill all fields!");
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then(async (userCredential) => {
                    const user = userCredential.user;

                    await setDoc(doc(db, "users", user.uid), {
                        name: fullname,
                        email: email,
                        role: "user",
                        createdAt: new Date()
                    });

                    alert("Signup Successful!");
                    window.location.href = "login.html";
                })
                .catch((error) => {
                    alert(error.message);
                    console.log(error);
                });
        };
    </script>
</head>

<body>

    <div class="signup-box">
        <h2>Create Account</h2>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullname" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter a password">
        </div>

        <button class="signup-btn" onclick="signup()">Sign Up</button>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

</body>

</html>
